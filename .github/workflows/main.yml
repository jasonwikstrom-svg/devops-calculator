name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Installera Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installera dependencies
        run: npm ci

      - name: Kör tester
        run: npm run test -- --run

      - name: Bygg appen
        run: npm run build

      - name: Ladda upp build-filer
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy till GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4